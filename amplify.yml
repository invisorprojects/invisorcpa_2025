version: 1
frontend:
    phases:
        preBuild:
            commands:
                - npm install -g pnpm@11.1.1
                - pnpm install --frozen-lockfile --prod=false
                - env | grep -E '^(PAYLOAD_SECRET|DATABASE_URI|UPLOADTHING_TOKEN|GOOGLE_MAPS_API_KEY|GOOGLE_PLACE_ID|GROQ_API_KEY|GROQ_MODEL)=' >> .env.production
        build:
            commands:
                - pnpm run build
                - rm -f node_modules/@swc/core-linux-x64-gnu/swc.linux-x64-gnu.node
                - rm -f node_modules/@swc/core-linux-x64-musl/swc.linux-x64-musl.node
    artifacts:
        baseDirectory: .next
        files:
            - '**/*'
    cache:
        paths:
            - $(pnpm store path)
            - .next/cache/**/*
