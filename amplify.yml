version: 1
frontend:
    phases:
        preBuild:
            commands:
                - nvm install 20
                - nvm use 20
                - corepack enable
                - corepack prepare pnpm@11.1.0 --activate
                - pnpm install --frozen-lockfile
                - printenv | grep -E '^(PAYLOAD_SECRET|DATABASE_URI|UPLOADTHING_TOKEN|NEXT_PUBLIC_STORYBLOK_TOKEN|NEXT_PUBLIC_SITE_URL|NEXT_PUBLIC_GA_ID)=' > .env.production
        build:
            commands:
                - pnpm run build
                - rm -f node_modules/@swc/core-linux-x64-gnu/swc.linux-x64-gnu.node
                - rm -f node_modules/@swc/core-linux-x64-musl/swc.linux-x64-musl.node
    artifacts:
        baseDirectory: .next
        files:
            - '**/*'
    cache:
        paths:
            - $(pnpm store path)
            - .next/cache/**/*
